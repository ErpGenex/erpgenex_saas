{% extends "templates/web.html" %}

{% block page_content %}
{% include "templates/includes/erpgenex_saas_nav.html" %}
<div class="container py-5">
  <h1>Create your tenant</h1>
  <form id="erpgenex-saas-register-form" class="erpgenex-saas-form mt-4">
    <div class="mb-3">
      <label class="form-label">Company / Customer Name</label>
      <input type="text" class="form-control" name="customer_name" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" class="form-control" name="company_email" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" class="form-control" name="password" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Plan</label>
      <select class="form-control" name="plan" required>
        {% for plan in plans %}
        <option value="{{ plan.name }}">{{ plan.plan_name or plan.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="mb-3">
      <label class="form-label">Billing Cycle</label>
      <select class="form-control" name="billing_cycle" required>
        {% for cycle in billing_cycles %}
        <option value="{{ cycle }}">{{ cycle }}</option>
        {% endfor %}
      </select>
    </div>
    <button type="submit" class="btn btn-primary">Register</button>
  </form>
  <div id="erpgenex-saas-register-result" class="mt-3"></div>
</div>
{% endblock %}
